<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienste</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}
body{
  background:#111;
  color:white;
  padding:20px;
}
h1{
  text-align:center;
  font-size:48px;
  margin-bottom:30px;
}
.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}
.admin-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  text-decoration:none;
}
.delete-btn{
  background:#dc2626;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  max-width:1200px;
  margin:auto;
}
.card{
  background:#1c1c1f;
  border-radius:22px;
  padding:20px;
  position:relative;
}
.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
}
.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>
<body>

<h1>Dienste</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffne()">+ Dienst hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="date" id="datum">
    <input type="time" id="von">
    <input type="time" id="bis">
    <input id="ort" placeholder="Veranstaltungsort">
    <input id="art" placeholder="Veranstaltungsart">
    <input id="auftraggeber" placeholder="Auftraggeber">
    <input id="verantwortlich" placeholder="Verantwortlicher vor Ort">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script>
const adminPasswort='Admin2026';
let liste=[];

function oeffne(){
  const p=prompt('Admin Passwort eingeben');
  if(p!==adminPasswort)return;
  document.getElementById('modal').style.display='flex';
}

function speichern(){
  const datum=document.getElementById('datum').value;
  const von=document.getElementById('von').value;
  const bis=document.getElementById('bis').value;
  const ort=document.getElementById('ort').value;
  const art=document.getElementById('art').value;
  const auftraggeber=document.getElementById('auftraggeber').value;
  const verantwortlich=document.getElementById('verantwortlich').value;

  if(!datum)return;

  liste.push({datum,von,bis,ort,art,auftraggeber,verantwortlich});
  render();
  schliessen();
}

function render(){
  const c=document.getElementById('container');
  c.innerHTML='';

  liste.forEach((x,i)=>{
    c.innerHTML+=`
    <div class="card">
      <button class="remove-btn" onclick="loeschen(${i})">X</button>
      <h2>${x.datum}</h2>
      <p>${x.von} - ${x.bis}</p>
      <p>${x.ort}</p>
      <p>${x.art}</p>
      <p>Auftraggeber: ${x.auftraggeber}</p>
      <p>Verantwortlich: ${x.verantwortlich}</p>
    </div>`;
  });
}

function loeschen(i){
  const p=prompt('Admin Passwort eingeben');
  if(p!==adminPasswort)return;
  liste.splice(i,1);
  render();
}

function schliessen(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
