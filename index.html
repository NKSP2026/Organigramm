<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitarbeiter Übersicht</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      padding: 20px;
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: white;
      font-size: 48px;
    }

    .top-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .admin-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.2s;
    }

    .admin-btn:hover {
      background: #1d4ed8;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .card {
      background: #1c1c1f;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: 0.25s ease;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px;
      min-height: 180px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
    }

    .card img {
      width: 110px;
      height: 140px;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid #444;
      flex-shrink: 0;
    }

    .card-content h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: white;
    }

    .card-content p {
      color: #bbb;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .role-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background: #3f3f46;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: #1c1c1f;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 600px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-content img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .details {
      padding: 25px;
    }

    .details h2 {
      margin-bottom: 20px;
      font-size: 30px;
      color: white;
    }

    .details p {
      margin-bottom: 10px;
      color: #ccc;
      font-size: 17px;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 18px;
      color: white;
      font-size: 34px;
      cursor: pointer;
      z-index: 10;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111;
      color: white;
      margin-bottom: 12px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .cancel-btn {
      background: #666;
    }

    .cancel-btn:hover {
      background: #555;
    }

    @media (max-width: 800px) {
      .row {
        grid-template-columns: 1fr;
      }

      .card {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

<script>
  const seitenPasswort = "NKSP2026";
  const adminPasswort = "Admin2026";

  let eingabe = prompt("Bitte Passwort eingeben:");

  if (eingabe !== seitenPasswort) {
    document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:100px;'>Zugriff verweigert</h1>";
  }
</script>

<h1>Mitarbeiter Übersicht</h1>

<div class="top-bar">
  <button class="admin-btn" onclick="oeffneFormular()">+ Mitarbeiter hinzufügen</button>
</div>

<div class="container">
  <div class="row" id="mitarbeiterRow">

    <div class="card" onclick="showDetails(
      'Ronny Winkler',
      '33',
      'Mitarbeiter',
      '01.02.2025',
      'Feuerwehrmann',
      'Tischler',
      'Sachkunde §34a',
      'Ja',
      'Ja',
      'B, C',
      'Nicole Küttner',
      'bilder/ronny,w.jpg'
    )">
      <img src="bilder/ronny,w.jpg" alt="Ronny Winkler">
      <div class="card-content">
        <h2>Ronny Winkler</h2>
        <p>Geb. 30.05.1992</p>
        <p>Mitarbeiter</p>
        <span class="role-badge">Mitarbeiter</span>
      </div>
    </div>

  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <img id="detailImage" src="" alt="Bild">

    <div class="details">
      <h2 id="detailName"></h2>
      <p><strong>Funktion:</strong> <span id="detailRole"></span></p>
      <p><strong>Angestellt seit:</strong> <span id="detailSince"></span></p>
      <p><strong>Alter:</strong> <span id="detailAge"></span></p>
      <p><strong>Beruf:</strong> <span id="detailJob"></span></p>
      <p><strong>Ausbildung:</strong> <span id="detailTraining"></span></p>
      <p><strong>Sicherheitsdienst:</strong> <span id="detailSecurity"></span></p>
      <p><strong>Ersthelfer/in:</strong> <span id="detailFirstAid"></span></p>
      <p><strong>Brandschutzhelfer/in:</strong> <span id="detailFire"></span></p>
      <p><strong>Führerschein:</strong> <span id="detailLicense"></span></p>
      <p><strong>Vorgesetzter:</strong> <span id="detailBoss"></span></p>
    </div>
  </div>
</div>

<div class="modal" id="formularModal">
  <div class="modal-content">
    <span class="close" onclick="schliesseFormular()">&times;</span>

    <div class="details">
      <h2>Neuen Mitarbeiter anlegen</h2>

      <input type="text" id="formName" placeholder="Name">
      <input type="text" id="formGeburt" placeholder="Geburtsdatum">
      <input type="text" id="formAlter" placeholder="Alter">
      <input type="text" id="formFunktion" placeholder="Funktion">
      <input type="text" id="formSeit" placeholder="Angestellt seit">
      <input type="text" id="formBeruf" placeholder="Beruf">
      <input type="text" id="formAusbildung" placeholder="Ausbildung">
      <input type="text" id="formSicherheit" placeholder="Sicherheitsdienst">
      <input type="text" id="formErsthelfer" placeholder="Ersthelfer/in">
      <input type="text" id="formBrandschutz" placeholder="Brandschutzhelfer/in">
      <input type="text" id="formFuehrerschein" placeholder="Führerschein">
      <input type="text" id="formChef" placeholder="Vorgesetzter">
      <input type="file" id="formBild" accept="image/*">

      <div class="button-group">
        <button class="admin-btn" onclick="speichereMitarbeiter()">Speichern</button>
        <button class="admin-btn cancel-btn" onclick="schliesseFormular()">Abbrechen</button>
      </div>
    </div>
  </div>
</div>

<script>
  function showDetails(name, age, role, since, job, training, security, firstAid, fire, license, boss, image) {
    document.getElementById('detailName').innerText = name;
    document.getElementById('detailAge').innerText = age;
    document.getElementById('detailRole').innerText = role;
    document.getElementById('detailSince').innerText = since;
    document.getElementById('detailJob').innerText = job;
    document.getElementById('detailTraining').innerText = training;
    document.getElementById('detailSecurity').innerText = security;
    document.getElementById('detailFirstAid').innerText = firstAid;
    document.getElementById('detailFire').innerText = fire;
    document.getElementById('detailLicense').innerText = license;
    document.getElementById('detailBoss').innerText = boss;
    document.getElementById('detailImage').src = image;
    document.getElementById('detailModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('detailModal').style.display = 'none';
  }

  function oeffneFormular() {
    const passwort = prompt('Admin Passwort eingeben');

    if (passwort !== adminPasswort) {
      alert('Falsches Passwort');
      return;
    }

    document.getElementById('formularModal').style.display = 'flex';
  }

  function schliesseFormular() {
    document.getElementById('formularModal').style.display = 'none';
  }

  function speichereMitarbeiter() {
    const name = document.getElementById('formName').value;
    const geburt = document.getElementById('formGeburt').value;
    const alter = document.getElementById('formAlter').value;
    const funktion = document.getElementById('formFunktion').value;
    const seit = document.getElementById('formSeit').value;
    const beruf = document.getElementById('formBeruf').value;
    const ausbildung = document.getElementById('formAusbildung').value;
    const sicherheit = document.getElementById('formSicherheit').value;
    const ersthelfer = document.getElementById('formErsthelfer').value;
    const brandschutz = document.getElementById('formBrandschutz').value;
    const fuehrerschein = document.getElementById('formFuehrerschein').value;
    const chef = document.getElementById('formChef').value;

    const bildDatei = document.getElementById('formBild').files[0];

    if (!name || !bildDatei) {
      alert('Bitte mindestens Name und Bild eingeben');
      return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
      const bild = e.target.result;

      const neueKarte = document.createElement('div');
      neueKarte.className = 'card';

      neueKarte.innerHTML = `
        <img src="${bild}" alt="${name}">
        <div class="card-content">
          <h2>${name}</h2>
          <p>Geb. ${geburt}</p>
          <p>${funktion}</p>
          <span class="role-badge">${funktion}</span>
        </div>
      `;

      neueKarte.setAttribute('onclick', `showDetails('${name}','${alter}','${funktion}','${seit}','${beruf}','${ausbildung}','${sicherheit}','${ersthelfer}','${brandschutz}','${fuehrerschein}','${chef}','${bild}')`);

      neueKarte.oncontextmenu = function(event) {
        event.preventDefault();

        const passwort = prompt('Admin Passwort zum Löschen eingeben');

        if (passwort === adminPasswort) {
          neueKarte.remove();
        } else {
          alert('Falsches Passwort');
        }
      };

      document.getElementById('mitarbeiterRow').appendChild(neueKarte);
      schliesseFormular();
    };

    reader.readAsDataURL(bildDatei);
  }

  window.onclick = function(event) {
    const detailModal = document.getElementById('detailModal');
    const formularModal = document.getElementById('formularModal');

    if (event.target === detailModal) {
      detailModal.style.display = 'none';
    }

    if (event.target === formularModal) {
      formularModal.style.display = 'none';
    }
  }
</script>

</body>
</html>
